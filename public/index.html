<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一言 API</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 40px; max-width: 600px; width: 90%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 24px; margin-bottom: 16px; }
    p { color: #666; line-height: 1.8; margin-bottom: 12px; }
    code { background: #f0f0f0; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
    .endpoint { margin-top: 20px; padding: 16px; background: #f9f9f9; border-radius: 8px; text-align: left; }
    .endpoint strong { display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>一言 API</h1>
    <p>随机获取一言语句，数据来源于 Hitokoto</p>
    <div class="endpoint">
      <strong>GET /yiyi</strong>
      <p>随机返回 10 条一言数据</p>
      <code>curl /yiyi</code>
    </div>
    <p style="margin-top: 20px; font-size: 13px; color: #999;">by 小旭</p>
  </div>
</body>
</html>
